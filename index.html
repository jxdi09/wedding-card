<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Wedding Invitation</title>
    <meta name="description" content="ร่วมแสดงความยินดีและเขียนคำอวยพรงานแต่งงาน JM">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Prompt:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Background Image -->
        <div class="background-image"></div>

        <!-- Main Content Glassmorphism Box -->
        <div class="glass-card">

            <!-- Header Section -->
            <header class="header-section">
                <img src="assets/img/logo.png" alt="JM Logo" class="initials-img">
                <p class="wedding-date">19 . 12 . 26</p>
                <p class="greeting">ขอเชิญร่วมแสดงความยินดีและส่งคำอวยพรแด่คู่บ่าวสาว</p>
            </header>

            <form id="weddingForm" class="wedding-form">

                <!-- Donation / Gift Section -->
                <section class="gift-section">
                    <div class="qr-container">
                        <!-- QR Code -->
                        <img src="assets/img/qr.jpg" alt="QR Code" class="qr-code">
                    </div>

                    <div class="gift-inputs">
                        <button type="button" class="btn-attach-slip" id="attachSlipBtn" blank="upload.html">
                            + แนบสลิปของท่าน
                        </button>
                        <input type="file" id="slipInput" class="hidden-input" accept="image/*">

                        <div class="input-group">
                            <label for="amount">จำนวนเงิน (บาท)</label>
                            <input type="number" id="amount" placeholder="ระบุจำนวนเงิน" required>
                        </div>
                    </div>
                </section>

                <!-- Guest Info Section -->
                <section class="guest-info-section">
                    <div class="input-group row-group">
                        <label for="guestName">ชื่อ - นามสกุล</label>
                        <input type="text" id="guestName" placeholder="กรุณาระบุชื่อของท่าน" required>
                    </div>
                    
                    <div class="input-group">
                        <label>ท่านเป็นแขกของ</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="side" value="ฝ่ายเจ้าบ่าว">
                                <span class="custom-radio"></span>
                                ฝ่ายเจ้าบ่าว
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="side" value="ฝ่ายเจ้าสาว">
                                <span class="custom-radio"></span>
                                ฝ่ายเจ้าสาว
                            </label>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>ความสะดวกในการเข้าร่วมงาน</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="attendance" value="ยินดีมาร่วมงาน">
                                <span class="custom-radio"></span>
                                ยินดีมาร่วมงาน
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="attendance" value="ไม่สามารถมาร่วมงานได้">
                                <span class="custom-radio"></span>
                                ไม่สามารถมาร่วมงานได้
                            </label>
                        </div>
                    </div>
                    
                </section>

                <!-- Gallery Section -->
                <section class="gallery-section">
                    <h2 class="section-title pink-badge">Wedding Gallery</h2>
                    <div class="gallery-grid">
                        <div class="gallery-item">
                            <img src="assets/img/set1/1.jpg" alt="Gallery 1">
                        </div>
                        <div class="gallery-item">
                            <img src="assets/img/set1/2.jpg" alt="Gallery 2">
                        </div>
                        <div class="gallery-item">
                            <img src="assets/img/set1/3.jpg" alt="Gallery 3">
                        </div>
                    </div>
                </section>

                <!-- Blessing Section -->
                <section class="blessing-section">
                    <h2 class="section-title pink-badge">ข้อความอวยพร</h2>
                    <textarea id="blessingMessage" rows="4" placeholder="พิมพ์คำอวยพรแด่คู่บ่าวสาว..."
                        required></textarea>
                </section>

                <!-- Submit Section -->
                <div class="submit-section">
                    <button type="submit" class="btn-submit">
                        <svg class="heart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                                fill="currentColor" />
                        </svg>
                        ส่งคำอวยพร
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-icon">🌸</div>
            <h2>ขอขอบพระคุณ</h2>
            <p>เราทั้งสองได้รับคำอวยพรและของขวัญจากท่านเรียบร้อยแล้ว ขอบพระคุณที่ร่วมยินดีกับเราค่ะ/ครับ</p>
            <button class="btn-close-modal">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
