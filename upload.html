<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Slip - JM Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Prompt:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Background Image -->
        <div class="background-image"></div>

        <!-- Main Content Glassmorphism Box -->
        <div class="glass-card">

            <!-- Header Section -->
            <header class="header-section">
                <img src="assets/img/logo.png" alt="JM Logo" class="initials-img">
                <p class="wedding-date">19 . 12 . 26</p>
            </header>

            <form id="uploadForm" class="wedding-form">

                <!-- Large Upload Area -->
                <div class="upload-area" id="dropZone">
                    <p class="upload-text">แตะที่นี่เพื่อแนบสลิปโอนเงิน</p>
                    <div class="plus-icon">+</div>
                    <input type="file" id="slipUploadInput" class="hidden-input" accept="image/*" required>
                    <div id="previewContainer" class="preview-container hidden">
                        <img id="slipPreview" src="" alt="Slip Preview" class="slip-preview-img">
                        <p class="change-text">แตะเพื่อเปลี่ยนรูป</p>
                    </div>
                </div>

                <!-- Gallery Section -->
                <section class="gallery-section">
                    <h2 class="section-title pink-badge">Wedding Gallery</h2>
                    <div class="gallery-grid">
                        <div class="gallery-item">
                            <img src="assets/img/set2/4.jpg" alt="Gallery 1">
                        </div>
                        <div class="gallery-item">
                            <img src="assets/img/set2/5.jpg" alt="Gallery 2">
                        </div>
                        <div class="gallery-item">
                            <img src="assets/img/set2/6.jpg" alt="Gallery 3">
                        </div>
                    </div>
                </section>

                <!-- Submit Section -->
                <div class="submit-section">
                    <button type="submit" class="btn-submit">
                        <svg class="heart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                                fill="currentColor" />
                        </svg>
                        ส่งสลิป
                    </button>

                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-icon">🌸</div>
            <h2>ได้รับสลิปเรียบร้อยแล้ว</h2>
            <p>ขอบพระคุณที่ร่วมเป็นส่วนหนึ่งในวันสำคัญของเราทั้งสองค่ะ/ครับ</p>
            <button class="btn-close-modal">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
